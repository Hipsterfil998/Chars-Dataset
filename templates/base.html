<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dataset Viewer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; min-height: 100vh;
           font-family: 'Inter', system-ui, sans-serif;
           background: #0a0f1e; color: #cbd5e1; }
    a { color: #38bdf8; text-decoration: none; }
    a:hover { color: #7dd3fc; text-decoration: none; }

    /* Sidebar */
    #sidebar { width: 240px; min-width: 240px; background: #0f172a;
               border-right: 1px solid #1e293b;
               padding: 0; display: flex; flex-direction: column;
               position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    #sidebar .logo {
      padding: 20px 20px 18px;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 0.02em;
      color: #f1f5f9;
      border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; gap: 8px;
    }
    #sidebar .logo-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    #sidebar .section-label {
      padding: 18px 20px 6px;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: .1em; color: #475569; font-weight: 600;
    }
    #sidebar ul { list-style: none; padding: 0 8px; }
    #sidebar ul li a {
      display: block; padding: 7px 12px; font-size: 0.8rem;
      color: #64748b; border-radius: 5px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #sidebar ul li a:hover { background: #1e293b; color: #cbd5e1; }
    #sidebar ul li a.active { background: #1e3a5f; color: #38bdf8; font-weight: 500; }

    #sidebar .nav-bottom {
      padding: 8px; border-top: 1px solid #1e293b; margin-top: auto;
    }
    #sidebar .nav-bottom a {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 5px;
      font-size: 0.82rem; color: #64748b;
      transition: background 0.15s, color 0.15s;
    }
    #sidebar .nav-bottom a:hover { background: #1e293b; color: #cbd5e1; }
    #sidebar .nav-bottom a.active { background: #1e3a5f; color: #38bdf8; font-weight: 500; }
    .nav-icon { font-size: 0.9rem; }

    /* Main */
    #main { flex: 1; padding: 40px 48px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; letter-spacing: -0.01em; }
    h2 { font-size: 1rem; font-weight: 600; color: #e2e8f0; margin-bottom: 14px; }
    .subtitle { color: #475569; font-size: 0.82rem; margin-bottom: 28px; }
    .subtitle a { color: #64748b; }
    .subtitle a:hover { color: #38bdf8; }

    /* Table */
    .table-wrap { border: 1px solid #1e293b; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead { background: #0f172a; }
    th { text-align: left; padding: 10px 16px; color: #475569;
         border-bottom: 1px solid #1e293b; font-weight: 600;
         font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; }
    td { padding: 10px 16px; border-bottom: 1px solid #131d30; color: #94a3b8; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #0f172a; color: #cbd5e1; }
    td a { font-weight: 500; }

    /* Badge / chip */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 9999px;
             font-size: 0.72rem; font-weight: 500;
             background: #0c2340; color: #38bdf8; border: 1px solid #1e3a5f; }
    .badge.role { background: #1a0533; color: #c084fc; border-color: #2e1065; }

    /* Sentence card */
    .sentence-card {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 8px; padding: 14px 18px;
      margin-bottom: 8px; font-size: 0.875rem; line-height: 1.85;
      transition: border-color 0.15s;
    }
    .sentence-card:hover { border-color: #334155; }
    .sentence-card .meta {
      font-size: 0.72rem; color: #334155; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .sentence-card .meta .sep { color: #1e293b; }
    .char-token {
      background: #0c2340; color: #38bdf8;
      border: 1px solid #1e3a5f;
      border-radius: 4px; padding: 1px 4px; font-weight: 500;
    }

    /* Form */
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
    input[type=text], select {
      background: #0f172a; border: 1px solid #1e293b; color: #e2e8f0;
      padding: 8px 12px; border-radius: 6px; font-size: 0.85rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type=text]:focus, select:focus {
      outline: none; border-color: #334155;
    }
    input[type=text] { flex: 2; min-width: 160px; }
    select { flex: 1; min-width: 120px; }
    button[type=submit] {
      background: #0ea5e9; color: #fff; border: none; padding: 8px 20px;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem;
      font-family: inherit; font-weight: 500;
      transition: background 0.15s;
    }
    button[type=submit]:hover { background: #0284c7; }

    /* Remove filter link */
    .remove-filter {
      font-size: 0.78rem; color: #475569; padding: 4px 8px;
      border: 1px solid #1e293b; border-radius: 5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .remove-filter:hover { color: #94a3b8; border-color: #334155; }

    /* Pagination */
    .pagination { display: flex; gap: 4px; margin-top: 24px; align-items: center; }
    .pagination a, .pagination span {
      padding: 5px 11px; border-radius: 5px; font-size: 0.78rem;
      background: #0f172a; color: #475569;
      border: 1px solid #1e293b;
      transition: background 0.15s, color 0.15s;
    }
    .pagination a:hover { background: #1e293b; color: #cbd5e1; }
    .pagination .current { background: #0ea5e9; color: #fff; border-color: #0ea5e9; font-weight: 600; }

    /* Stats */
    .chart-container {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 8px; padding: 24px;
      margin-bottom: 20px;
    }
    .chart-container h2 { margin-bottom: 18px; }
  </style>
</head>
<body>
<nav id="sidebar">
  <div class="logo">
    <div class="logo-icon">📚</div>
    Dataset Viewer
  </div>
  <div class="section-label">Books</div>
  <ul>
    {% for b in sidebar_books %}
    <li><a href="{{ url_for('book_detail', book_id=b.id) }}"
           class="{{ 'active' if request.path == url_for('book_detail', book_id=b.id) else '' }}">
      {{ b.title[:30] }}{% if b.title|length > 30 %}…{% endif %}
    </a></li>
    {% endfor %}
  </ul>
  <div class="nav-bottom">
    <a href="{{ url_for('search') }}" class="{{ 'active' if request.path == '/search' else '' }}">
      <span class="nav-icon">🔍</span> Search
    </a>
    <a href="{{ url_for('stats') }}" class="{{ 'active' if request.path == '/stats' else '' }}">
      <span class="nav-icon">📊</span> Statistics
    </a>
  </div>
</nav>
<main id="main">
  {% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
